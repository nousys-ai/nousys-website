<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nousys AI — Coming Soon</title>
  <meta name="description" content="Nousys AI — Something new is on the way.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f6f4f0;
      --fg: #1a1a1e;
      --accent: #2d5a8e;
      --muted: #8e8b83;
      --line: #ccc8be;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* fine grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%231a1a1e' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: reveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2.2rem, 5.5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--fg);
      margin-bottom: 0.3rem;
    }

    .brand span {
      font-weight: 400;
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.8rem;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--line);
      margin: 0 auto 2.8rem;
      animation: grow 1s 0.6s ease-out both;
    }

    .coming-soon {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--muted);
      animation: reveal 1.4s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .dots { display: inline-block; width: 1.5em; text-align: left; }
    .dots::after {
      content: '';
      animation: dots 2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes grow {
      from { width: 0; opacity: 0; }
      to   { width: 48px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="brand">Nousys <span>AI</span></h1>
    <p class="tagline">Intelligent Systems</p>
    <div class="rule"></div>
    <p class="coming-soon">Coming Soon<span class="dots"></span></p>
  </div>
</body>
</html>
